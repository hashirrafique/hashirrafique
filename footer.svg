<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="50%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>
  
  <text x="400" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="600" font-style="italic"
        fill="#ffffff" text-anchor="middle" filter="url(#glow)" letter-spacing="1">
    "The best infrastructure is the one that no one notices."
  </text>
  <text x="400" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="800"
        fill="url(#textGrad)" text-anchor="middle" letter-spacing="4">
    BUILD FAST  ·  AUTOMATE EVERYTHING  ·  SCALE INFINITELY
  </text>
  
  <circle cx="60" cy="65" r="2" fill="#38bdf8" opacity="0.6"/>
  <circle cx="740" cy="65" r="2" fill="#38bdf8" opacity="0.6"/>
  <rect x="70" y="64" width="80" height="2" fill="#1f6feb" opacity="0.4"/>
  <rect x="650" y="64" width="80" height="2" fill="#1f6feb" opacity="0.4"/>
</svg>