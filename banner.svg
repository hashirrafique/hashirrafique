<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="200" viewBox="0 0 1000 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="60%" style="stop-color:#0f2044"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#38bdf8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="200" fill="url(#bg)"/>

  <!-- Animated particles -->
  <circle cx="80" cy="40" r="2" fill="#38bdf8" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="160" r="1.5" fill="#38bdf8" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.6;0.1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="30" r="2" fill="#1f6feb" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="170" r="1.5" fill="#38bdf8" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="950" cy="60" r="2.5" fill="#1f6feb" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="100" x2="1000" y2="100" stroke="#1f6feb" stroke-width="0.3" opacity="0.2"/>
  <line x1="500" y1="0" x2="500" y2="200" stroke="#1f6feb" stroke-width="0.3" opacity="0.15"/>

  <!-- Animated horizontal accent line -->
  <rect x="0" y="195" width="1000" height="2" fill="url(#line1)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="3" width="1000" height="1.5" fill="url(#line1)" opacity="0.5"/>

  <!-- Main name text -->
  <text x="500" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700"
        fill="#ffffff" text-anchor="middle" filter="url(#softglow)" letter-spacing="2">
    Muhammad Hashir
  </text>

  <!-- Subtitle with glow -->
  <text x="500" y="135" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="400"
        fill="#38bdf8" text-anchor="middle" filter="url(#glow)" letter-spacing="3" opacity="0.9">
    FULL STACK ENGINEER  ·  DEVOPS ARCHITECT  ·  CLOUD BUILDER
  </text>

  <!-- Corner decorations -->
  <rect x="20" y="15" width="40" height="2" fill="#38bdf8" opacity="0.6" rx="1"/>
  <rect x="20" y="15" width="2" height="40" fill="#38bdf8" opacity="0.6" rx="1"/>
  <rect x="940" y="15" width="40" height="2" fill="#38bdf8" opacity="0.6" rx="1"/>
  <rect x="978" y="15" width="2" height="40" fill="#38bdf8" opacity="0.6" rx="1"/>
  <rect x="20" y="183" width="40" height="2" fill="#38bdf8" opacity="0.6" rx="1"/>
  <rect x="20" y="145" width="2" height="40" fill="#38bdf8" opacity="0.6" rx="1"/>
  <rect x="940" y="183" width="40" height="2" fill="#38bdf8" opacity="0.6" rx="1"/>
  <rect x="978" y="145" width="2" height="40" fill="#38bdf8" opacity="0.6" rx="1"/>
</svg>