<svg xmlns="http://www.w3.org/2000/svg" width="800" height="60" viewBox="0 0 800 60">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#38bdf8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <text x="400" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="800"
        fill="#ffffff" text-anchor="middle" filter="url(#glow)" letter-spacing="3">
    TECH STACK & TOOLS
  </text>
  <rect x="250" y="55" width="300" height="2" fill="url(#lineGrad)"/>
</svg>